name: pages

# Build & deploy the static results page from the COMMITTED results.json.
# CI never runs the benchmark (torch/metric tools live on the VPS) — it only
# renders whatever results were committed.

on:
  push:
    branches: [main]
    paths:
      - "results/**"
      - "src/wmbench/report/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install report deps only
        run: pip install -e .
      - name: Build site from committed results
        run: python -m wmbench.report.generate results/results.json site
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deploy
        uses: actions/deploy-pages@v4
