name: tests

on:
  push:
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install (no torch / no metric tools)
        run: pip install -e ".[dev]"
      - name: Run tests
        # The torch adapters and external metric tools are absent here, so the
        # live/integration tests self-skip; core logic is fully exercised.
        run: pytest -q
